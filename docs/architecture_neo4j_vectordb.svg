<svg width="1280" height="820" viewBox="0 0 1280 820" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', 'Noto Sans KR', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5B7B3A"/>
    </marker>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9AA189"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1280" height="820" fill="#FAFAF6"/>

  <!-- Title -->
  <text x="640" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#22301C">임베딩 · 그래프DB 구성도</text>
  <text x="640" y="66" text-anchor="middle" font-size="13" fill="#8A9578">Vector DB(성경 구절 검색) + Neo4j(제자 · MBTI 관계) 데이터 파이프라인</text>

  <!-- ── 왼쪽: Vector DB 파이프라인 ───────────────────────────────── -->
  <rect x="40" y="96" width="560" height="690" rx="14" fill="#FFFFFF" stroke="#E4E5D6" stroke-width="1.5"/>
  <text x="70" y="132" font-size="16" font-weight="700" fill="#3A4A28">📚 Vector DB 파이프라인</text>
  <text x="70" y="152" font-size="11.5" fill="#8A9578">성경 66권 · 31,077개 구절 → 의미 기반 검색</text>

  <!-- 원본 데이터 -->
  <rect x="70" y="176" width="500" height="46" rx="8" fill="#F6F8EF" stroke="#D6DCC4"/>
  <text x="90" y="199" font-size="13" font-weight="600" fill="#22301C">bible_structured.json</text>
  <text x="90" y="214" font-size="10.5" fill="#8A9578">{ book, chapter, verse, content } × 31,077</text>

  <line x1="320" y1="222" x2="320" y2="248" stroke="#9AA189" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- 전처리 -->
  <rect x="70" y="248" width="500" height="46" rx="8" fill="#F6F8EF" stroke="#D6DCC4"/>
  <text x="90" y="271" font-size="13" font-weight="600" fill="#22301C">clean_text() 전처리 + 1구절 = 1 Chunk</text>
  <text x="90" y="286" font-size="10.5" fill="#8A9578">page_content = "[책 장:절] 본문" · metadata = {book, chapter, verse, content}</text>

  <line x1="320" y1="294" x2="320" y2="320" stroke="#9AA189" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- 임베딩 모델 -->
  <rect x="70" y="320" width="500" height="60" rx="8" fill="#EAF0DE" stroke="#5B7B3A" stroke-width="1.5"/>
  <text x="90" y="343" font-size="13" font-weight="700" fill="#3A4A28">임베딩 모델</text>
  <text x="90" y="360" font-size="11" fill="#5E6B52">로컬: HuggingFace ko-sroberta-multitask (768dim)</text>
  <text x="90" y="374" font-size="11" fill="#5E6B52">배포: OpenAI text-embedding-3-small (1536dim)</text>

  <line x1="200" y1="380" x2="200" y2="406" stroke="#9AA189" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <line x1="440" y1="380" x2="440" y2="406" stroke="#9AA189" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- 저장소 2종 -->
  <rect x="70" y="406" width="230" height="76" rx="8" fill="#FFFEFB" stroke="#E4E5D6"/>
  <text x="90" y="430" font-size="13" font-weight="700" fill="#22301C">Chroma (로컬)</text>
  <text x="90" y="448" font-size="10.5" fill="#8A9578">data/chroma_db/</text>
  <text x="90" y="463" font-size="10.5" fill="#8A9578">개발 중 자동 재생성</text>

  <rect x="340" y="406" width="230" height="76" rx="8" fill="#FFFEFB" stroke="#5B7B3A" stroke-width="1.5"/>
  <text x="360" y="430" font-size="13" font-weight="700" fill="#22301C">Qdrant Cloud (배포)</text>
  <text x="360" y="448" font-size="10.5" fill="#8A9578">collection: bible_verses</text>
  <text x="360" y="463" font-size="10.5" fill="#8A9578">사전 임베딩 스냅샷 복원</text>

  <line x1="320" y1="482" x2="320" y2="508" stroke="#9AA189" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- 검색 -->
  <rect x="70" y="508" width="500" height="60" rx="8" fill="#F6F8EF" stroke="#D6DCC4"/>
  <text x="90" y="531" font-size="13" font-weight="600" fill="#22301C">search(query, k, books)</text>
  <text x="90" y="548" font-size="10.5" fill="#8A9578">코사인 유사도 Top-K + graph-guided book 필터</text>
  <text x="90" y="561" font-size="10.5" fill="#8A9578">(Neo4j가 고른 제자의 연관 성경서로 범위 축소)</text>

  <line x1="320" y1="568" x2="320" y2="594" stroke="#5B7B3A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- LLM -->
  <rect x="70" y="594" width="500" height="52" rx="8" fill="#EAF0DE" stroke="#5B7B3A" stroke-width="1.5"/>
  <text x="90" y="618" font-size="13" font-weight="700" fill="#3A4A28">LLM 답변 생성</text>
  <text x="90" y="634" font-size="10.5" fill="#5E6B52">검색 구절을 Context로 페르소나 프롬프트에 결합 → 답변 끝에 [핵심구절] 1개만 표기</text>

  <!-- 배지: 규모 -->
  <rect x="70" y="668" width="500" height="98" rx="8" fill="#FFFEFB" stroke="#E4E5D6" stroke-dasharray="4 3"/>
  <text x="90" y="692" font-size="12" font-weight="700" fill="#22301C">규모</text>
  <text x="90" y="712" font-size="11" fill="#5E6B52">· 원문 66권 · 1,189장 · 31,077개 구절</text>
  <text x="90" y="729" font-size="11" fill="#5E6B52">· 배치 저장: 500 chunk / batch</text>
  <text x="90" y="746" font-size="11" fill="#5E6B52">· DB/임베딩 장애 시 mock_data 폴백으로 응답 유지</text>

  <!-- ── 오른쪽: Neo4j 그래프 스키마 ───────────────────────────────── -->
  <rect x="620" y="96" width="620" height="690" rx="14" fill="#FFFFFF" stroke="#E4E5D6" stroke-width="1.5"/>
  <text x="650" y="132" font-size="16" font-weight="700" fill="#3A4A28">🔗 Neo4j 그래프 스키마</text>
  <text x="650" y="152" font-size="11.5" fill="#8A9578">Neo4j Aura · 예수님 1 · 제자 12 · MBTI 16 · Trait 37 · Verse 15 · User N</text>

  <!-- 노드: Jesus (center top) -->
  <ellipse cx="930" cy="210" rx="70" ry="30" fill="#EAF0DE" stroke="#5B7B3A" stroke-width="1.5"/>
  <text x="930" y="207" text-anchor="middle" font-size="12.5" font-weight="700" fill="#3A4A28">:Jesus</text>
  <text x="930" y="222" text-anchor="middle" font-size="9.5" fill="#5E6B52">×1</text>

  <!-- 노드: Disciple -->
  <ellipse cx="930" cy="330" rx="80" ry="32" fill="#EAF0DE" stroke="#5B7B3A" stroke-width="1.5"/>
  <text x="930" y="326" text-anchor="middle" font-size="12.5" font-weight="700" fill="#3A4A28">:Disciple</text>
  <text x="930" y="342" text-anchor="middle" font-size="9.5" fill="#5E6B52">×12 · id,name,title,speech_style,quote,traits</text>

  <!-- FOLLOWS -->
  <line x1="930" y1="298" x2="930" y2="240" stroke="#5B7B3A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="945" y="272" font-size="10" fill="#5B7B3A">FOLLOWS</text>

  <!-- 노드: MBTI -->
  <ellipse cx="710" cy="330" rx="65" ry="30" fill="#F6F8EF" stroke="#9AA189" stroke-width="1.3"/>
  <text x="710" y="326" text-anchor="middle" font-size="12.5" font-weight="700" fill="#22301C">:MBTI</text>
  <text x="710" y="342" text-anchor="middle" font-size="9.5" fill="#8A9578">×16 · type</text>

  <!-- HAS_MBTI (Disciple -> MBTI) -->
  <line x1="857" y1="322" x2="778" y2="326" stroke="#5B7B3A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="785" y="310" font-size="9.5" fill="#5B7B3A">HAS_MBTI{rank}</text>

  <!-- MATCHES (MBTI -> Disciple) -->
  <line x1="778" y1="345" x2="850" y2="341" stroke="#B08A3E" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="778" y="365" font-size="9.5" fill="#B08A3E">MATCHES (1:1)</text>

  <!-- MBTI_COMPATIBILITY self loop -->
  <path d="M 660 310 C 610 280, 610 380, 660 350" fill="none" stroke="#9AA189" stroke-width="1.3" stroke-dasharray="3 3" marker-end="url(#arrowGray)"/>
  <text x="565" y="330" font-size="9.5" fill="#8A9578">MBTI_COMPATIBILITY</text>
  <text x="590" y="343" font-size="9.5" fill="#8A9578">{score} · 16×16</text>

  <!-- 노드: Trait -->
  <ellipse cx="710" cy="450" rx="65" ry="30" fill="#F6F8EF" stroke="#9AA189" stroke-width="1.3"/>
  <text x="710" y="446" text-anchor="middle" font-size="12.5" font-weight="700" fill="#22301C">:Trait</text>
  <text x="710" y="462" text-anchor="middle" font-size="9.5" fill="#8A9578">×37 · name</text>

  <line x1="880" y1="352" x2="750" y2="428" stroke="#5B7B3A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="775" y="405" font-size="9.5" fill="#5B7B3A">HAS_TRAIT</text>

  <!-- 노드: Verse -->
  <ellipse cx="930" cy="450" rx="70" ry="30" fill="#F6F8EF" stroke="#9AA189" stroke-width="1.3"/>
  <text x="930" y="446" text-anchor="middle" font-size="12.5" font-weight="700" fill="#22301C">:Verse</text>
  <text x="930" y="462" text-anchor="middle" font-size="9.5" fill="#8A9578">×15 · ref, text</text>

  <line x1="930" y1="362" x2="930" y2="420" stroke="#5B7B3A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="945" y="395" font-size="9.5" fill="#5B7B3A">RELATED_VERSE</text>

  <!-- 노드: Disciple self (BROTHER_OF) -->
  <path d="M 1000 330 C 1060 300, 1060 360, 1000 340" fill="none" stroke="#9AA189" stroke-width="1.3" stroke-dasharray="3 3" marker-end="url(#arrowGray)"/>
  <text x="1015" y="320" font-size="9.5" fill="#8A9578">BROTHER_OF</text>

  <!-- 노드: User -->
  <ellipse cx="710" cy="570" rx="65" ry="30" fill="#EEF0DF" stroke="#B08A3E" stroke-width="1.3"/>
  <text x="710" y="566" text-anchor="middle" font-size="12.5" font-weight="700" fill="#22301C">:User</text>
  <text x="710" y="582" text-anchor="middle" font-size="9.5" fill="#8A9578">회원 · name,mbti</text>

  <line x1="740" y1="545" x2="880" y2="345" stroke="#B08A3E" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="760" y="470" font-size="9.5" fill="#B08A3E">MATCHED_WITH{matched_at}</text>

  <!-- 추천 로직 요약 배지 -->
  <rect x="650" y="622" width="560" height="144" rx="8" fill="#FFFEFB" stroke="#E4E5D6" stroke-dasharray="4 3"/>
  <text x="670" y="646" font-size="12" font-weight="700" fill="#22301C">recommend_disciples(user_mbti) 순위 로직</text>
  <text x="670" y="668" font-size="11" fill="#5E6B52">1. (MBTI)-[:MATCHES]→(Disciple) 직접 매칭이면 최고점(100)</text>
  <text x="670" y="686" font-size="11" fill="#5E6B52">2. 그 외엔 (MBTI)-[:MBTI_COMPATIBILITY]→(MBTI) curated 점수를</text>
  <text x="670" y="702" font-size="11" fill="#5E6B52">   제자의 HAS_MBTI(1·2순위) 타입에 대입해 순위 계산</text>
  <text x="670" y="722" font-size="11" fill="#5E6B52">3. 결과 verses(RELATED_VERSE)는 hybrid_rag 컨텍스트로 재사용</text>
  <text x="670" y="748" font-size="10" fill="#8A9578">※ Neo4j 연결 실패 시 mock_data.SCORES 매트릭스로 자동 폴백</text>
</svg>
